<section class="flex justify-center px-4 py-16 min-h-screen">
  <div class="w-full max-w-4xl">

    <!-- Heading -->
    <div class="text-center mb-14">
      <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight">
        Mon <span class="text-blue-600">parcours</span>
      </h2>
      <p class="mt-2 text-gray-500 text-sm font-light">Expériences professionnelles</p>
    </div>

    <!-- Timeline -->
    <ul class="relative">

      <!-- Vertical line -->
      <div
        class="absolute top-0 left-1/2 -translate-x-1/2 w-0.5 h-full
               bg-gradient-to-b from-transparent via-blue-200 to-transparent z-0">
      </div>

      <!-- Items -->
      <li
        *ngFor="let item of items; let i = index"
        class="relative flex items-center w-full mb-14 group"
        [class.justify-start]="item.side === 'left'"
        [class.justify-end]="item.side === 'right'">

        <!-- Node / Logo -->
        <div
          class="z-10 absolute left-1/2 -translate-x-1/2
                 w-14 h-14 rounded-full bg-white
                 flex items-center justify-center">
          <img
            [src]="item.logo"
            [alt]="item.company"
            class="w-9 h-9 object-contain"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
          <!-- Fallback initials -->
          <span
            class="hidden text-blue-600 font-bold text-sm items-center justify-center">
            {{ item.company.charAt(0) }}
          </span>
        </div>

        <!-- Card -->
        <div
          class="relative grey border border-slate-100 rounded-2xl p-6 shadow-sm
                 w-[calc(49%-3.5rem)] transition-all duration-300"
          [class.mr-14]="item.side === 'left'"
          [class.ml-auto]="item.side === 'left'"
          [class.ml-14]="item.side === 'right'"
          [class.mr-auto]="item.side === 'right'">

          <!-- Date badge -->
          <time
            class="inline-block text-xs font-semibold tracking-widest uppercase
                   text-blue-600 bg-blue-50 px-2.5 py-0.5 rounded-full mb-3">
            {{ item.date }}
          </time>

          <!-- Title -->
          <h3 class="text-lg font-extrabold text-gray-900 leading-snug mb-1">
            {{ item.title }}
          </h3>

          <!-- Company -->
          <p class="text-sm font-medium text-blue-500 mb-4">
            {{ item.company }}
          </p>

          <!-- Tasks -->
          <ul
            *ngIf="item.tasks && item.tasks.length"
            class="space-y-1.5 mb-4">
            <li
              *ngFor="let task of item.tasks"
              class="flex items-start gap-2 text-sm text-slate-600">
              <span class="mt-1 w-1.5 h-1.5 rounded-full bg-blue-400 flex-shrink-0"></span>
              {{ task }}
            </li>
          </ul>

          <!-- Tags -->
          <div
            *ngIf="item.tags && item.tags.length"
            class="flex flex-wrap gap-2">
            <span
              *ngFor="let tag of item.tags"
              class="px-3 py-0.5 rounded-full text-xs font-medium"
              [ngClass]="tag.color">
              {{ tag.label }}
            </span>
          </div>

        </div>
      </li>

    </ul>
  </div>
</section>
